  <!--  Consent Mode v2 + GTM + GA4                                -->
  <!--  Default: all denied. Granted on banner accept.             -->

  <script>
    /*EDITMODE-BEGIN*/window.__U1_CFG = {
      "GA4_ID": "G-XXXXXXXXXX",
      "GTM_ID": "GTM-XXXXXXX",
      "FORMSPREE_ID": "FORMSPREE_FORM_ID",
      "PROD_HOSTS": "u1dynamics.com,www.u1dynamics.com"
    }/*EDITMODE-END*/;

    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    window.gtag = gtag;

    // Consent Mode v2 — start denied, persist user choice in localStorage
    var __consent = (function(){
      try { return JSON.parse(localStorage.getItem('u1_consent') || 'null'); } catch(e){ return null; }
    })();
    var defaults = {
      ad_storage: 'denied', ad_user_data: 'denied', ad_personalization: 'denied',
      analytics_storage: 'denied', functionality_storage: 'granted', security_storage: 'granted'
    };
    gtag('consent', 'default', defaults);
    if (__consent === 'granted') {
      gtag('consent', 'update', {
        ad_storage:'granted', ad_user_data:'granted', ad_personalization:'granted', analytics_storage:'granted'
      });
    }

    // Only load tags on real production hosts (keeps previews clean).
    var prodHosts = (window.__U1_CFG.PROD_HOSTS||'').split(',').map(function(s){return s.trim().toLowerCase();});
    window.__U1_IS_PROD = prodHosts.indexOf(location.hostname.toLowerCase()) !== -1;

    if (window.__U1_IS_PROD && !/X{5,}/.test(window.__U1_CFG.GTM_ID)) {
      (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start': new Date().getTime(), event:'gtm.js'});
        var f=d.getElementsByTagName(s)[0], j=d.createElement(s), dl=l!='dataLayer'?'&l='+l:'';
        j.async=true; j.src='https://www.googletagmanager.com/gtm.js?id='+i+dl;
        f.parentNode.insertBefore(j,f);
      })(window,document,'script','dataLayer', window.__U1_CFG.GTM_ID);
    }
    if (window.__U1_IS_PROD && !/X{5,}/.test(window.__U1_CFG.GA4_ID)) {
      var s = document.createElement('script');
      s.async = true;
      s.src = 'https://www.googletagmanager.com/gtag/js?id=' + window.__U1_CFG.GA4_ID;
      document.head.appendChild(s);
      gtag('js', new Date());
      gtag('config', window.__U1_CFG.GA4_ID, {
        anonymize_ip: true,
        send_page_view: true
      });
    }

    // Outbound-link tracking (works whether or not gtag is live)
    document.addEventListener('click', function(e){
      var a = e.target && e.target.closest && e.target.closest('a[href^="http"]');
      if (a && !a.href.includes(location.hostname)) {
        gtag('event', 'click_outbound', { link_url: a.href });
      }
      var tel = e.target && e.target.closest && e.target.closest('a[href^="tel:"]');
      if (tel) gtag('event', 'phone_click', { phone: tel.getAttribute('href').slice(4) });
      var mail = e.target && e.target.closest && e.target.closest('a[href^="mailto:"]');
      if (mail) gtag('event', 'email_click', { email: mail.getAttribute('href').slice(7) });
    });
  </script>

  <div class="cookie-banner" id="cookie-banner" role="dialog" aria-live="polite" aria-label="Cookie consent">
    <h4>Cookies &amp; analytics</h4>
    <p>We use a small number of cookies to measure traffic and improve the site. No ads, no third-party sale. <a href="#" id="cookie-more" aria-label="Learn more">Details</a>.</p>
    <div class="cookie-banner-row">
      <button type="button" class="primary" id="cookie-accept">Accept</button>
      <button type="button" id="cookie-decline">Decline</button>
    </div>
  </div>
  <script>
    (function(){
      var b = document.getElementById('cookie-banner');
      var stored = null;
      try { stored = localStorage.getItem('u1_consent'); } catch(e){}
      if (!stored) setTimeout(function(){ b.classList.add('is-on'); }, 1200);
      function set(v){
        try { localStorage.setItem('u1_consent', v); } catch(e){}
        b.classList.remove('is-on');
        if (v === 'granted' && window.gtag) {
          gtag('consent', 'update', {
            ad_storage:'granted', ad_user_data:'granted',
            ad_personalization:'granted', analytics_storage:'granted'
          });
        }
      }
      document.getElementById('cookie-accept').addEventListener('click', function(){ set('granted'); });
      document.getElementById('cookie-decline').addEventListener('click', function(){ set('denied'); });
    })();
  </script>
